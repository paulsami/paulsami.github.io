
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.wrap{padding:1.5rem 0}
.tabs{display:flex;gap:6px;margin-bottom:1.25rem}
.tab{background:transparent;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:6px 16px;font-size:13px;cursor:pointer;color:var(--color-text-secondary);transition:all .15s}
.tab.on{background:#E6F1FB;border-color:#378ADD;color:#0C447C;font-weight:500}
.controls{display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap;align-items:center}
.btn{background:transparent;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:6px 14px;font-size:13px;cursor:pointer;color:var(--color-text-secondary);transition:all .15s}
.btn:hover{background:var(--color-background-secondary)}
.btn.primary{background:#E6F1FB;border-color:#378ADD;color:#0C447C}
.btn.danger{background:#FCEBEB;border-color:#E24B4A;color:#791F1F}
.btn:disabled{opacity:.4;cursor:not-allowed}
.reset-btn{margin-left:auto}
.canvas-wrap{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:1.25rem;margin-bottom:1rem;overflow:hidden}
.log-wrap{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem;min-height:80px;max-height:180px;overflow-y:auto}
.log-entry{font-size:12px;font-family:var(--font-mono);padding:3px 0;border-bottom:0.5px solid var(--color-border-tertiary);color:var(--color-text-secondary);display:flex;gap:8px;align-items:flex-start}
.log-entry:last-child{border-bottom:none}
.log-entry .ts{color:var(--color-text-tertiary);flex-shrink:0}
.log-entry .ev{flex:1}
.log-entry.success .ev{color:var(--color-text-success)}
.log-entry.error .ev{color:var(--color-text-danger)}
.log-entry.compensate .ev{color:#BA7517}
.log-entry.info .ev{color:var(--color-text-info)}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary)}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
</style>

<div class="wrap">
<h2 class="sr-only">Interactive Saga pattern simulator showing choreography and orchestration variants for Java microservices.</h2>

<div class="tabs">
  <button class="tab on" onclick="setMode('choreography',this)">Choreography saga</button>
  <button class="tab" onclick="setMode('orchestration',this)">Orchestration saga</button>
</div>

<div class="controls">
  <button class="btn primary" id="btn-happy" onclick="runScenario('happy')"><i class="ti ti-check" aria-hidden="true" style="font-size:13px;margin-right:4px"></i>Happy path</button>
  <button class="btn danger" id="btn-fail-pay" onclick="runScenario('fail-payment')"><i class="ti ti-x" aria-hidden="true" style="font-size:13px;margin-right:4px"></i>Payment fails</button>
  <button class="btn danger" id="btn-fail-inv" onclick="runScenario('fail-inventory')"><i class="ti ti-x" aria-hidden="true" style="font-size:13px;margin-right:4px"></i>Inventory fails</button>
  <button class="btn reset-btn" onclick="resetAll()"><i class="ti ti-refresh" aria-hidden="true" style="font-size:13px;margin-right:4px"></i>Reset</button>
</div>

<div class="legend">
  <div class="leg"><div class="leg-dot" style="background:#1D9E75"></div>Success</div>
  <div class="leg"><div class="leg-dot" style="background:#E24B4A"></div>Failure</div>
  <div class="leg"><div class="leg-dot" style="background:#EF9F27"></div>Compensating</div>
  <div class="leg"><div class="leg-dot" style="background:#888780"></div>Idle</div>
</div>

<div class="canvas-wrap">
  <svg id="saga-svg" width="100%" viewBox="0 0 620 260"></svg>
</div>

<div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:6px">Event log</div>
<div class="log-wrap" id="log"></div>
</div>

<script>
const SERVICES_CHOREO = [
  {id:'order', label:'Order', sub:'Service', x:30},
  {id:'inventory', label:'Inventory', sub:'Service', x:165},
  {id:'payment', label:'Payment', sub:'Service', x:300},
  {id:'notification', label:'Notification', sub:'Service', x:435},
];
const SERVICES_ORCH = [
  {id:'orchestrator', label:'Saga', sub:'Orchestrator', x:30},
  {id:'order', label:'Order', sub:'Service', x:165},
  {id:'inventory', label:'Inventory', sub:'Service', x:300},
  {id:'payment', label:'Payment', sub:'Service', x:435},
];

let mode = 'choreography';
let running = false;
let stepIdx = 0;
let steps = [];
let animTimer = null;
let serviceStates = {};

function setMode(m, btn) {
  mode = m;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  resetAll();
}

function services() {
  return mode === 'choreography' ? SERVICES_CHOREO : SERVICES_ORCH;
}

function resetAll() {
  if(animTimer) clearTimeout(animTimer);
  running = false;
  stepIdx = 0;
  steps = [];
  document.getElementById('log').innerHTML = '';
  services().forEach(s=>serviceStates[s.id]='idle');
  drawCanvas([]);
  document.getElementById('btn-happy').disabled = false;
  document.getElementById('btn-fail-pay').disabled = false;
  document.getElementById('btn-fail-inv').disabled = false;
}

const choreoHappy = [
  {from:'order',to:'inventory',label:'OrderPlaced',type:'event',state:{order:'success'}},
  {from:'inventory',to:'payment',label:'InventoryReserved',type:'event',state:{inventory:'success'}},
  {from:'payment',to:'notification',label:'PaymentProcessed',type:'event',state:{payment:'success'}},
  {from:'notification',to:null,label:'EmailSent',type:'done',state:{notification:'success'}},
];
const choreoFailPay = [
  {from:'order',to:'inventory',label:'OrderPlaced',type:'event',state:{order:'success'}},
  {from:'inventory',to:'payment',label:'InventoryReserved',type:'event',state:{inventory:'success'}},
  {from:'payment',to:'inventory',label:'PaymentFailed',type:'error',state:{payment:'error'}},
  {from:'inventory',to:'order',label:'InventoryCancelled',type:'compensate',state:{inventory:'compensate'}},
  {from:'order',to:null,label:'OrderCancelled',type:'compensate',state:{order:'compensate'}},
];
const choreoFailInv = [
  {from:'order',to:'inventory',label:'OrderPlaced',type:'event',state:{order:'success'}},
  {from:'inventory',to:'order',label:'InventoryFailed',type:'error',state:{inventory:'error'}},
  {from:'order',to:null,label:'OrderCancelled',type:'compensate',state:{order:'compensate'}},
];

const orchHappy = [
  {from:'orchestrator',to:'order',label:'CreateOrder',type:'cmd',state:{orchestrator:'success',order:'success'}},
  {from:'orchestrator',to:'inventory',label:'ReserveInventory',type:'cmd',state:{inventory:'success'}},
  {from:'orchestrator',to:'payment',label:'ProcessPayment',type:'cmd',state:{payment:'success'}},
  {from:'orchestrator',to:null,label:'Saga complete',type:'done',state:{orchestrator:'success'}},
];
const orchFailPay = [
  {from:'orchestrator',to:'order',label:'CreateOrder',type:'cmd',state:{orchestrator:'success',order:'success'}},
  {from:'orchestrator',to:'inventory',label:'ReserveInventory',type:'cmd',state:{inventory:'success'}},
  {from:'orchestrator',to:'payment',label:'ProcessPayment',type:'cmd',state:{payment:'error'}},
  {from:'orchestrator',to:'inventory',label:'CancelInventory',type:'compensate',state:{inventory:'compensate'}},
  {from:'orchestrator',to:'order',label:'CancelOrder',type:'compensate',state:{order:'compensate',orchestrator:'error'}},
];
const orchFailInv = [
  {from:'orchestrator',to:'order',label:'CreateOrder',type:'cmd',state:{orchestrator:'success',order:'success'}},
  {from:'orchestrator',to:'inventory',label:'ReserveInventory',type:'cmd',state:{inventory:'error'}},
  {from:'orchestrator',to:'order',label:'CancelOrder',type:'compensate',state:{order:'compensate',orchestrator:'error'}},
];

function getSteps(scenario) {
  if(mode==='choreography') {
    if(scenario==='happy') return choreoHappy;
    if(scenario==='fail-payment') return choreoFailPay;
    return choreoFailInv;
  } else {
    if(scenario==='happy') return orchHappy;
    if(scenario==='fail-payment') return orchFailPay;
    return orchFailInv;
  }
}

function runScenario(scenario) {
  if(running) return;
  resetAll();
  running = true;
  steps = getSteps(scenario);
  document.getElementById('btn-happy').disabled=true;
  document.getElementById('btn-fail-pay').disabled=true;
  document.getElementById('btn-fail-inv').disabled=true;
  stepIdx = 0;
  tick();
}

function tick() {
  if(stepIdx >= steps.length) { running=false; return; }
  const step = steps[stepIdx];
  Object.assign(serviceStates, step.state);
  addLog(step);
  drawCanvas(steps.slice(0, stepIdx+1));
  stepIdx++;
  animTimer = setTimeout(tick, 900);
}

const typeColor = {event:'#1D9E75', cmd:'#378ADD', error:'#E24B4A', compensate:'#EF9F27', done:'#1D9E75'};
const stateColor = {idle:'#B4B2A9', success:'#1D9E75', error:'#E24B4A', compensate:'#EF9F27'};
const stateFill  = {idle:'#F1EFE8', success:'#E1F5EE', error:'#FCEBEB', compensate:'#FAEEDA'};
const stateText  = {idle:'#444441', success:'#085041', error:'#791F1F', compensate:'#633806'};

function drawCanvas(doneSteps) {
  const svcs = services();
  const BOX_W=110, BOX_H=52, LIFE_Y=100, LIFE_H=140;
  const centerX = s => s.x + BOX_W/2;
  let svg = `<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>`;

  svcs.forEach(s=>{
    const st = serviceStates[s.id]||'idle';
    const fx=stateFill[st], bx=stateColor[st], tx=stateText[st];
    svg+=`<rect x="${s.x}" y="10" width="${BOX_W}" height="${BOX_H}" rx="8" fill="${fx}" stroke="${bx}" stroke-width="1"/>`;
    svg+=`<text x="${s.x+BOX_W/2}" y="32" text-anchor="middle" font-size="13" font-weight="500" fill="${tx}" font-family="var(--font-sans)">${s.label}</text>`;
    svg+=`<text x="${s.x+BOX_W/2}" y="50" text-anchor="middle" font-size="11" fill="${tx}" font-family="var(--font-sans)">${s.sub}</text>`;
    svg+=`<line x1="${s.x+BOX_W/2}" y1="${BOX_H+10}" x2="${s.x+BOX_W/2}" y2="${LIFE_Y+LIFE_H}" stroke="${bx}" stroke-width="1" stroke-dasharray="4 3"/>`;
  });

  doneSteps.forEach((step,i)=>{
    if(!step.to) return;
    const fromSvc = svcs.find(s=>s.id===step.from);
    const toSvc = svcs.find(s=>s.id===step.to);
    if(!fromSvc||!toSvc) return;
    const y = LIFE_Y + 20 + i*22;
    const x1=centerX(fromSvc), x2=centerX(toSvc);
    const col=typeColor[step.type]||'#888780';
    const dir = x2>x1?1:-1;
    svg+=`<line x1="${x1}" y1="${y}" x2="${x2}" y2="${y}" stroke="${col}" stroke-width="1.5" marker-end="url(#arr)"/>`;
    const lx=(x1+x2)/2;
    svg+=`<rect x="${lx-42}" y="${y-16}" width="84" height="15" rx="3" fill="var(--color-background-secondary)"/>`;
    svg+=`<text x="${lx}" y="${y-5}" text-anchor="middle" font-size="10" fill="${col}" font-family="var(--font-sans)" font-weight="500">${step.label}</text>`;
  });

  document.getElementById('saga-svg').innerHTML = svg;
}

let logTs = 0;
function addLog(step) {
  logTs++;
  const cls = step.type==='error'?'error':step.type==='compensate'?'compensate':step.type==='done'?'success':'info';
  const icons = {event:'→',cmd:'⟶',error:'✕',compensate:'↩',done:'✓'};
  const icon = icons[step.type]||'→';
  const msg = step.to
    ? `${icon} ${step.from} → ${step.to}: ${step.label}`
    : `${icon} ${step.label}`;
  const el = document.getElementById('log');
  el.innerHTML += `<div class="log-entry ${cls}"><span class="ts">t+${logTs}</span><span class="ev">${msg}</span></div>`;
  el.scrollTop = el.scrollHeight;
}

resetAll();
</script>
